<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoStock Portal - Sign In</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body {
            background-image: url(inventorytwo.jpg);
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121826; /* Dark background to match dashboard */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #0d2446;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            width: 320px;
            text-align: center;
        }
        h2 {
            color: #38bdf8; /* Teal accent */
            margin-bottom: 8px;
            font-weight: 600;
        }
        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #38bdf8;
            border: none;
            border-radius: 6px;
            color: #121826;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0ea5e9;
        }
        .error-message {
            color: #ef4444;
            margin-top: 14px;
            font-size: 13px;
            min-height: 18px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>AutoStock Portal</h1>
        <p>Warehouse Management Login</p>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="manager@autostock.com">
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        
        <button onclick="handleLogin()">Sign In</button>
        <div class="error-message" id="errorDiv"></div>
    </div>

    <script>
        // Config credentials for your custom app instance
        const firebaseConfig = {
            apiKey: "AIzaSyBhBTqQ1iadLatbKyD7DE7UM7gihfLjYEY", 
            authDomain: "autostock-c3953.firebaseapp.com",
            databaseURL: "https://autostock-c3953-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        
        // Connect to the operational stack
        firebase.initializeApp(firebaseConfig);

        function handleLogin() {
            //this code function when user click on the sign in button
            //getElementById look at specific text box ans grad what user type
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('errorDiv');

            // Reset error display area on click
            errorDiv.innerText = ""; 

            // Execute cloud identity verification
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Valid identity verified -> open main terminal dashboard screen
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    // Problem found -> parse and translate cloud network messages
                    if (error.code === "auth/wrong-password" || error.code === "auth/user-not-found") {
                        errorDiv.innerText = "Invalid email credentials or password.";
                    } else {
                        errorDiv.innerText = error.message;
                    }
                });
        }
    </script>
</body>
</html>
