<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damaged Items Report</title>
    <link rel="icon" type="image/png" href="../assets/autostock.logo.png">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="report-page" style="background-color: rgb(168, 226, 239);">

    <div class="page-container" style="background-color: rgb(211, 237, 240);">
        <div class="header-row">
            <h2 class="page-title">Damaged Items Report</h2>
            <div class="button-group" style="display: flex; gap: 10px;">
                <button class="back-btn" style="background-color: #94a3b8;" onclick="window.location.href='../dashboard.html'">← Back</button>
                <button class="back-btn" style="background-color: #059669;" onclick="exportToPDF()">Export to PDF</button>
            </div>
        </div>

        <div class="filter-row">
            <input type="text" id="searchOutput" class="filter-dropdown" placeholder="Search Item ID..." onkeyup="renderTable()">
            <select id="categoryFilter" class="filter-dropdown" onchange="renderTable()">
                <option value="ALL">All Categories</option>
                <option value="Category_A">Category A</option>
                <option value="Category_B">Category B</option>
                <option value="Category_C">Category C</option>
            </select>
            <select id="monthFilter" class="filter-dropdown" onchange="renderTable()">
                <option value="ALL">All Months</option>
                <option value="01">January</option><option value="02">February</option>
                <option value="03">March</option><option value="04">April</option>
                <option value="05">May</option><option value="06">June</option>
                <option value="07">July</option><option value="08">August</option>
                <option value="09">September</option><option value="10">October</option>
                <option value="11">November</option><option value="12">December</option>
            </select>
        </div>

        <div class="table-scroll-container">
            <table class="inventory-table">
                <thead>
                    <tr><th>No.</th><th>Item ID</th><th>Category</th><th>Damaged Classification</th><th>Photo Attachment</th></tr>
                </thead>
                <tbody id="damagedTableBody">
                    <tr><td colspan='5' style='text-align: center;'>Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let damageData = [];

        database.ref('InventoryLogs').on('value', (snapshot) => {
            damageData = []; 
            snapshot.forEach((child) => {
                const item = child.val();
                item.key = child.key; 
                if ((item.Reason || "").toLowerCase() === "damaged") {
                    damageData.push(item);
                }
            });
            renderTable();
        });

        function renderTable() {
            const tableBody = document.getElementById('damagedTableBody');
            const search = document.getElementById('searchOutput').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;
            const mon = document.getElementById('monthFilter').value;
            tableBody.innerHTML = ""; 

            let filtered = damageData.filter(item => {
                const sMatch = (item.ItemID || "").toLowerCase().includes(search);
                const cMatch = (cat === "ALL" || item.Category === cat);
                const mMatch = (mon === "ALL" || (item.Timestamp && item.Timestamp.split(' ')[0].split('-')[1] === mon));
                return sMatch && cMatch && mMatch;
            });

            filtered.forEach((item, i) => {
                const photoCol = item.PhotoURL 
    ? `
        <div style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
            <a href="${item.PhotoURL}" target="_blank" style="color: green; font-weight: bold; text-decoration: none;">View Photo</a>
            <label style="color: #64748b; font-size: 11px; cursor: pointer; text-decoration: underline;">
                Re-upload
                <input type="file" accept="image/*" onchange="uploadPhoto(this, '${item.key}')" style="display: none;">
            </label>
        </div>
      ` 
    : `<input type="file" accept="image/*" onchange="uploadPhoto(this, '${item.key}')">`;

                tableBody.innerHTML += `
                    <tr>
                        <td>${i+1}</td>
                        <td>${item.ItemID || 'N/A'}</td>
                        <td>${item.Category || 'N/A'}</td>
                        <td>${item.Reason || 'General Damage'}</td> 
                        <td>${photoCol}</td>
                    </tr>`;
            });
        }

        async function uploadPhoto(input, key) {
            const file = input.files[0];
            if (!file) return;

            // Change UI to indicate status
            const container = input.parentElement;
            const originalHTML = container.innerHTML;
            container.innerHTML = "Uploading..."; 

            const apiKey = '2561a1e005fc38e872402a1206d241b9'; 
            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    await database.ref('InventoryLogs/' + key).update({ PhotoURL: result.data.url });
                    alert("Success! The photo has been updated.");
                } else {
                    alert("Upload failed: " + (result.error ? result.error.message : "Unknown error"));
                    container.innerHTML = originalHTML; // Restore original buttons
                }
            } catch (e) { 
                console.error(e);
                alert("Network error: " + e.message); 
                container.innerHTML = originalHTML; // Restore original buttons
            }
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Damaged Items Report", 14, 20);
            doc.autoTable({ html: '.inventory-table', startY: 30 });
            doc.save("Damaged_Items_Report.pdf");
        }
    </script>
</body>
</html>
