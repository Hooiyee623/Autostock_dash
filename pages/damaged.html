<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoStock — Damaged Items</title>
    <link rel="icon" type="image/png" href="../assets/autostock_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="report-page">

    <div class="report-layout">

        <header class="report-header">
            <div class="report-header-left">
                <button class="back-btn" onclick="window.location.href='../dashboard.html'">
                    <span class="material-symbols-outlined" style="font-size:16px;">arrow_back</span>
                    Back
                </button>
                <span class="report-title">Damaged Items Report</span>
            </div>
            <button class="export-btn" onclick="exportToPDF()">
                <span class="material-symbols-outlined" style="font-size:16px;">download</span>
                Export PDF
            </button>
        </header>

        <div class="report-filters">
            <input type="text" id="searchInput" class="filter-input" placeholder="Search Item ID…" oninput="renderTable()">
            <select id="categoryFilter" class="filter-select" onchange="renderTable()">
                <option value="ALL">All Categories</option>
                <option value="Category_A">Category A</option>
                <option value="Category_B">Category B</option>
                <option value="Category_C">Category C</option>
            </select>
            <select id="monthFilter" class="filter-select" onchange="renderTable()">
                <option value="ALL">All Months</option>
                <option value="01">January</option><option value="02">February</option>
                <option value="03">March</option><option value="04">April</option>
                <option value="05">May</option><option value="06">June</option>
                <option value="07">July</option><option value="08">August</option>
                <option value="09">September</option><option value="10">October</option>
                <option value="11">November</option><option value="12">December</option>
            </select>
        </div>

        <div class="report-table-wrap">
            <table class="report-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Item ID</th>
                        <th>Category</th>
                        <th>Timestamp</th>
                        <th>Classification</th>
                        <th>Photo</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" style="text-align:center; padding:20px;">Loading…</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        let data = [];

        database.ref('InventoryLogs').on('value', snapshot => {
            data = [];
            snapshot.forEach(c => {
                const item = c.val();
                if ((item.Reason || '').toLowerCase() === 'damaged') {
                    data.push({ ...item, key: c.key });
                }
            });
            renderTable();
        });

        function renderTable() {
            const tbody  = document.getElementById('tableBody');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const cat    = document.getElementById('categoryFilter').value;
            const mon    = document.getElementById('monthFilter').value;

            const filtered = data.filter(item => {
                const sMatch = (item.ItemID || '').toLowerCase().includes(search);
                const cMatch = cat === 'ALL' || item.Category === cat;
                const mMatch = mon === 'ALL' || item.Timestamp?.split(' ')[0]?.split('-')[1] === mon;
                return sMatch && cMatch && mMatch;
            });

            if (!filtered.length) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:20px; color:var(--text-muted);">No damaged items found.</td></tr>`;
                return;
            }

            const rows = filtered.map((item, i) => {
                const photoCell = item.PhotoURL
                    ? `<a href="${item.PhotoURL}" target="_blank" class="view-photo-link">View Photo</a>
                       <label class="reupload-label">Re-upload<input type="file" accept="image/*" onchange="uploadPhoto(this, '${item.key}')" style="display:none;"></label>`
                    : `<label class="reupload-label" style="text-decoration:none;">
                           <span class="material-symbols-outlined" style="font-size:15px; vertical-align:middle;">upload</span> Upload
                           <input type="file" accept="image/*" onchange="uploadPhoto(this, '${item.key}')" style="display:none;">
                       </label>`;
                return `<tr>
                    <td>${i + 1}</td>
                    <td style="font-family:monospace; font-size:12px;">${item.ItemID || 'N/A'}</td>
                    <td>${item.Category?.replace('_', ' ') || 'N/A'}</td>
                    <td>${item.Timestamp || '—'}</td>
                    <td>${item.Reason || 'General Damage'}</td>
                    <td>${photoCell}</td>
                </tr>`;
            }).join('');

            const total = `<tr class="total-row">
                <td colspan="5" style="text-align:right;">Total:</td>
                <td>${filtered.length}</td>
            </tr>`;

            tbody.innerHTML = rows + total;
        }

        async function uploadPhoto(input, key) {
            const file = input.files[0];
            if (!file) return;
            const cell = input.closest('td');
            const original = cell.innerHTML;
            cell.textContent = 'Uploading…';

            const formData = new FormData();
            formData.append('image', file);

            try {
                const res    = await fetch('https://api.imgbb.com/1/upload?key=2561a1e005fc38e872402a1206d241b9', { method: 'POST', body: formData });
                const result = await res.json();
                if (result.success) {
                    await database.ref('InventoryLogs/' + key).update({ PhotoURL: result.data.url });
                } else {
                    alert('Upload failed: ' + (result.error?.message || 'Unknown error'));
                    cell.innerHTML = original;
                }
            } catch (e) {
                alert('Network error: ' + e.message);
                cell.innerHTML = original;
            }
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text('Damaged Items Report', 14, 20);
            doc.autoTable({ html: '.report-table', startY: 28 });
            doc.save('Damaged_Items.pdf');
        }
    </script>
</body>
</html>
