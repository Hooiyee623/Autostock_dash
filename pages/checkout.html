<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-Out History</title>
    <link rel="icon" type="image/png" href="../assets/autostock.logo.png">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="report-page" style="background-color: rgb(168, 226, 239);">

    <div class="page-container" style="background-color: rgb(211, 237, 240);">
        <div class="header-row">
            <h2 class="page-title">Total Check-Out History</h2>
            <div class="button-group" style="display: flex; gap: 10px;">
                <button class="back-btn" style="background-color: #94a3b8;" onclick="window.location.href='../dashboard.html'">← Back</button>
                <button class="back-btn" style="background-color: #059669;" onclick="exportToPDF()">Export to PDF</button>
            </div>
        </div>

        <div class="filter-row">
            <input type="text" id="searchOutput" class="filter-dropdown" placeholder="Search Item ID..." onkeyup="renderTable()">
            <select id="categoryFilter" class="filter-dropdown" onchange="renderTable()">
                <option value="ALL">All Categories</option>
                <option value="Category_A">Category A</option>
                <option value="Category_B">Category B</option>
                <option value="Category_C">Category C</option>
            </select>
            <select id="monthFilter" class="filter-dropdown" onchange="renderTable()">
                <option value="ALL">All Months</option>
                <option value="01">January</option><option value="02">February</option>
                <option value="03">March</option><option value="04">April</option>
                <option value="05">May</option><option value="06">June</option>
                <option value="07">July</option><option value="08">August</option>
                <option value="09">September</option><option value="10">October</option>
                <option value="11">November</option><option value="12">December</option>
            </select>
        </div>

        <div class="table-scroll-container">
            <table class="inventory-table">
                <thead>
                    <tr><th>No.</th><th>Item ID</th><th>Category</th><th>Timestamp</th><th>Reason</th><th>PIC</th></tr>
                </thead>
                <tbody id="checkOutTableBody">
                    <tr><td colspan='6' style='text-align: center;'>Loading Firebase Data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let checkOutData = [];

        database.ref('InventoryLogs').on('value', (snapshot) => {
            checkOutData = []; 
            snapshot.forEach((child) => {
                if (child.val().Action === "CHECK_OUT") checkOutData.push(child.val());
            });
            renderTable();
        });

        function renderTable() {
            const tableBody = document.getElementById('checkOutTableBody');
            const search = document.getElementById('searchOutput').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;
            const mon = document.getElementById('monthFilter').value;
            tableBody.innerHTML = ""; 

            let filtered = checkOutData.filter(item => {
                const sMatch = (item.ItemID || "").toLowerCase().includes(search);
                const cMatch = (cat === "ALL" || item.Category === cat);
                const mMatch = (mon === "ALL" || (item.Timestamp && item.Timestamp.split(' ')[0].split('-')[1] === mon));
                return sMatch && cMatch && mMatch;
            });

            if (filtered.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='6' style='text-align: center;'>No logs found.</td></tr>";
                return;
            }

            filtered.forEach((item, i) => {
                tableBody.innerHTML += `
                    <tr>
                        <td>${i+1}</td>
                        <td>${item.ItemID || 'N/A'}</td>
                        <td>${item.Category || 'N/A'}</td>
                        <td>${item.Timestamp || '-'}</td>
                        <td>${item.Reason || 'N/A'}</td>
                        <td>${item.PIC || 'Unknown'}</td>
                    </tr>`;
            });

            tableBody.innerHTML += `
                <tr style="background-color: #e2e8f0; font-weight: bold;">
                    <td colspan="5" style="text-align: right;">Total:</td>
                    <td>${filtered.length}</td>
                </tr>`;
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Check-Out History Report", 14, 20);
            doc.autoTable({ html: '.inventory-table', startY: 30 });
            doc.save("CheckOut_History.pdf");
        }
    </script>
</body>
</html>
