<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoStock — Check-In History</title>
    <link rel="icon" type="image/png" href="../assets/autostock_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="report-page">

    <div class="report-layout">

        <header class="report-header">
            <div class="report-header-left">
                <button class="back-btn" onclick="window.location.href='../dashboard.html'">
                    <span class="material-symbols-outlined" style="font-size:16px;">arrow_back</span>
                    Back
                </button>
                <span class="report-title">Check-In History</span>
            </div>
            <button class="export-btn" onclick="exportToPDF()">
                <span class="material-symbols-outlined" style="font-size:16px;">download</span>
                Export PDF
            </button>
        </header>

        <div class="report-filters">
            <input type="text" id="searchInput" class="filter-input" placeholder="Search Item ID…" oninput="renderTable()">
            <select id="categoryFilter" class="filter-select" onchange="renderTable()">
                <option value="ALL">All Categories</option>
                <option value="Category_A">Category A</option>
                <option value="Category_B">Category B</option>
                <option value="Category_C">Category C</option>
            </select>
            <select id="monthFilter" class="filter-select" onchange="renderTable()">
                <option value="ALL">All Months</option>
                <option value="01">January</option><option value="02">February</option>
                <option value="03">March</option><option value="04">April</option>
                <option value="05">May</option><option value="06">June</option>
                <option value="07">July</option><option value="08">August</option>
                <option value="09">September</option><option value="10">October</option>
                <option value="11">November</option><option value="12">December</option>
            </select>
        </div>

        <div class="report-table-wrap">
          <div class="report-table-scroll">
            <table class="report-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Item ID</th>
                        <th>Category</th>
                        <th>Check-In Date</th>
                        <th>Expiry Date</th>
                        <th>Days Left</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" style="text-align:center; padding:20px;">Loading…</td></tr>
                </tbody>
            </table>
          </div>
        </div>

    </div>

    <script>
        let data = [];

        database.ref('InventoryLogs').on('value', snapshot => {
            data = [];
            snapshot.forEach(c => { if (c.val().Action === 'CHECK_IN') data.push(c.val()); });
            renderTable();
        });

        function renderTable() {
            const tbody  = document.getElementById('tableBody');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const cat    = document.getElementById('categoryFilter').value;
            const mon    = document.getElementById('monthFilter').value;

            const filtered = data.filter(item => {
                const sMatch = (item.ItemID || '').toLowerCase().includes(search);
                const cMatch = cat === 'ALL' || item.Category === cat;
                const mMatch = mon === 'ALL' || item.Timestamp?.split(' ')[0]?.split('-')[1] === mon;
                return sMatch && cMatch && mMatch;
            });

            if (!filtered.length) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:20px; color:var(--text-muted);">No records found.</td></tr>`;
                return;
            }

            const rows = filtered.map((item, i) => {
                let daysLeft = '—', cls = '';
                if (item.ExpiryDate) {
                    const diff = Math.ceil((new Date(item.ExpiryDate.replace(' ', 'T')) - new Date()) / 86400000);
                    if (diff < 0)   { daysLeft = 'Expired';  cls = 'days-expired'; }
                    else if (diff < 30)  { daysLeft = diff;  cls = 'days-expired'; }
                    else if (diff < 365) { daysLeft = diff;  cls = 'days-warn'; }
                    else                 { daysLeft = diff;  cls = 'days-ok'; }
                }
                return `<tr>
                    <td>${i + 1}</td>
                    <td style="font-family:monospace; font-size:12px;">${item.ItemID || '—'}</td>
                    <td>${item.Category?.replace('_', ' ') || '—'}</td>
                    <td>${item.Timestamp || '—'}</td>
                    <td>${item.ExpiryDate || '—'}</td>
                    <td class="${cls}">${daysLeft}</td>
                </tr>`;
            }).join('');

            const total = `<tr class="total-row">
                <td colspan="5" style="text-align:right;">Total:</td>
                <td>${filtered.length}</td>
            </tr>`;

            tbody.innerHTML = rows + total;
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text('Check-In History Report', 14, 20);
            doc.autoTable({ html: '.report-table', startY: 28 });
            doc.save('CheckIn_History.pdf');
        }
    </script>
</body>
</html>
