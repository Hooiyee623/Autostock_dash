<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-In History</title>
    <link rel="icon" type="image/png" href="../assets/autostock.logo.png">
    <link rel="stylesheet" href="../css/style.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="../js/firebase-config.js"></script>
    <!-- PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="report-page" style="background-color: #92b7e7;">

    <div class="page-container" style="background-color: rgba(251, 252, 254, 0.452);">
        <div class="header-row">
            <h2 class="page-title">Total Check-In History</h2>
            <div class="button-group" style="display: flex; gap: 10px;">
                <button class="back-btn" style="background-color: #94a3b8;" onclick="window.location.href='../dashboard.html'">← Back</button>
                <button class="back-btn" style="background-color: #059669;" onclick="exportToPDF()">Export to PDF</button>
            </div>
        </div>

        <div class="filter-row">
            <input type="text" id="searchInput" class="filter-dropdown" placeholder="Search Item ID..." onkeyup="renderTable()">
            <select id="categoryFilter" class="filter-dropdown" onchange="renderTable()">
                <option value="ALL">All Categories</option>
                <option value="Category_A">Category A</option>
                <option value="Category_B">Category B</option>
                <option value="Category_C">Category C</option>
            </select>
            <select id="monthFilter" class="filter-dropdown" onchange="renderTable()">
                <option value="ALL">All Months</option>
                <option value="01">January</option><option value="02">February</option>
                <option value="03">March</option><option value="04">April</option>
                <option value="05">May</option><option value="06">June</option>
                <option value="07">July</option><option value="08">August</option>
                <option value="09">September</option><option value="10">October</option>
                <option value="11">November</option><option value="12">December</option>
            </select>
        </div>

        <div class="table-scroll-container">
            <table class="inventory-table">
                <thead>
                    <tr><th>No.</th><th>Item ID</th><th>Category</th><th>Timestamp</th><th>Expiry Date</th><th>Days Left</th></tr>
                </thead>
                <tbody id="checkInTableBody">
                    <tr><td colspan='6' style='text-align: center;'>Loading Firebase Data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let checkInData = [];

        database.ref('InventoryLogs').on('value', (snapshot) => {
            checkInData = []; 
            snapshot.forEach((child) => {
                if (child.val().Action === "CHECK_IN") checkInData.push(child.val());
            });
            renderTable();
        });

        function renderTable() {
            const tableBody = document.getElementById('checkInTableBody');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;
            const mon = document.getElementById('monthFilter').value;
            tableBody.innerHTML = ""; 

            let filtered = checkInData.filter(item => {
                const sMatch = (item.ItemID || "").toLowerCase().includes(search);
                const cMatch = (cat === "ALL" || item.Category === cat);
                let mMatch = (mon === "ALL" || (item.Timestamp && item.Timestamp.split(' ')[0].split('-')[1] === mon));
                return sMatch && cMatch && mMatch;
            });

           filtered.forEach((item, i) => {
    let daysLeft = "-";
    let colorStyle = ""; // New variable for color

    if (item.ExpiryDate) {
        const expiry = new Date(item.ExpiryDate.replace(' ', 'T'));
        const diff = Math.ceil((expiry - new Date()) / (1000 * 60 * 60 * 24));

        if (diff < 0) {
            daysLeft = "Expired";
            colorStyle = "color: red; font-weight: bold;";
        } else if (diff < 30) {
            // Less than 1 month
            daysLeft = diff ;
            colorStyle = "color: red; font-weight: bold;";
        } else if (diff <= 364) {
            // Note: > 149 and <= 364 falls here
            daysLeft = diff;
            colorStyle = "color: orange;"; // Using orange for better visibility than yellow
        } else {
            // > 364 days
            daysLeft = diff ;
            colorStyle = "color: green;";
        }
    }

    tableBody.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${item.ItemID}</td>
            <td>${item.Category}</td>
            <td>${item.Timestamp}</td>
            <td>${item.ExpiryDate || '-'}</td>
            <td style="${colorStyle}">${daysLeft}</td>
        </tr>`;
});
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Check-In History Report", 14, 20);
            doc.autoTable({ html: '.inventory-table', startY: 30 });
            doc.save("CheckIn_History.pdf");
        }
    </script>
</body>
</html>
