<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expired Items Report</title>
    <link rel="icon" type="image/png" href="autostock.logo.png">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #92b7e7; margin: 0; }
        .page-container { background-color: rgba(251, 252, 254, 0.452); padding: 30px; width: 100vw; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .page-title { color: #1a5c7b; margin: 0; font-size: 24px; }
        .back-btn { padding: 8px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; height: 40px; color: white; }
        .filter-row { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 15px; gap: 10px; flex-wrap: wrap; }
        .filter-dropdown { padding: 8px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 14px; cursor: pointer; }
        .table-scroll-container { flex: 1; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 8px; background-color: white; }
        .inventory-table { width: 100%; border-collapse: collapse; text-align: left; }
        .inventory-table th, .inventory-table td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .inventory-table th { background-color: #f8f9fa; color: #1e293b; position: sticky; top: 0; }
        .discard-btn { padding: 5px 10px; cursor: pointer; background-color: #ef4444; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="page-container">
        <div class="header-row">
            <h2 class="page-title">Expired Items Report</h2>
            <div style="display: flex; gap: 10px;">
                <button class="back-btn" style="background-color: #94a3b8;" onclick="window.location.href='indexpage.html'">← Back</button>
                <button class="back-btn" style="background-color: #059669;" onclick="exportToPDF()">Export to PDF</button>
            </div>
        </div>

        <div class="filter-row">
            <input type="text" id="searchInput" class="filter-dropdown" placeholder="Search Item ID..." onkeyup="renderTable()">
            <select id="categoryFilter" class="filter-dropdown" onchange="renderTable()">
                <option value="ALL">All Categories</option>
                <option value="Category_A">Category A</option>
                <option value="Category_B">Category B</option>
                <option value="Category_C">Category C</option>
            </select>
            <select id="monthFilter" class="filter-dropdown" onchange="renderTable()">
                <option value="ALL">All Months</option>
                <option value="01">January</option><option value="02">February</option>
                <option value="03">March</option><option value="04">April</option>
                <option value="05">May</option><option value="06">June</option>
                <option value="07">July</option><option value="08">August</option>
                <option value="09">September</option><option value="10">October</option>
                <option value="11">November</option><option value="12">December</option>
            </select>
        </div>

        <div class="table-scroll-container">
            <table class="inventory-table">
                <thead>
                    <tr><th>No.</th><th>Item ID</th><th>Category</th><th>Days Past Expiry</th><th>Discard Status</th></tr>
                </thead>
                <tbody id="expiredTableBody">
                    <tr><td colspan='5' style='text-align: center;'>Loading Expired Items...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBhBTqQ1iadLatbKyD7DE7UM7gihfLjYEY",
            authDomain: "autostock-c3953.firebaseapp.com",
            databaseURL: "https://autostock-c3953-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let expiredData = [];

        database.ref('InventoryLogs').on('value', (snapshot) => {
            expiredData = [];
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            snapshot.forEach((child) => {
                const item = child.val();
                if (item.Action === "CHECK_IN" && item.ExpiryDate) {
                    const expiry = new Date(item.ExpiryDate.replace(' ', 'T'));
                    if (expiry < today && item.Status !== "Removed") {
                        expiredData.push({ ...item, key: child.key });
                    }
                }
            });
            renderTable();
        });

        function renderTable() {
            const tableBody = document.getElementById('expiredTableBody');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;
            const mon = document.getElementById('monthFilter').value;
            tableBody.innerHTML = "";

            const filtered = expiredData.filter(item => {
                const sMatch = (item.ItemID || "").toLowerCase().includes(search);
                const cMatch = (cat === "ALL" || item.Category === cat);
                // Extract month from ExpiryDate string (YYYY-MM-DD)
                const itemMon = item.ExpiryDate ? item.ExpiryDate.split(' ')[0].split('-')[1] : "";
                const mMatch = (mon === "ALL" || itemMon === mon);
                return sMatch && cMatch && mMatch;
            });

            filtered.forEach((item, i) => {
                const daysPast = Math.floor((new Date() - new Date(item.ExpiryDate.replace(' ', 'T'))) / (1000 * 60 * 60 * 24));
                const status = item.Status || "Not Removed";
                
                tableBody.innerHTML += `<tr>
                    <td>${i+1}</td>
                    <td>${item.ItemID || 'N/A'}</td>
                    <td>${item.Category || 'N/A'}</td>
                    <td>${daysPast} days</td>
                    <td>
                        ${status === "Removed" ? "Removed" : `<button class="discard-btn" onclick="markRemoved('${item.key}')">Mark Removed</button>`}
                    </td>
                </tr>`;
            });
        }

        function markRemoved(key) {
            database.ref('InventoryLogs/' + key).update({ Status: "Removed" });
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Expired Items Report", 14, 20);
            doc.autoTable({ html: '.inventory-table', startY: 30 });
            doc.save("Expired_Items.pdf");
        }
    </script>
</body>
</html>
