<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoStock - Operations Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121826; color: white; margin: 20px; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-btn { padding: 8px 16px; background-color: #ef4444; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .logout-btn:hover { background-color: #dc2626; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background-color: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .stat-box { display: inline-block; width: 30%; text-align: center; background: #334155; padding: 15px; border-radius: 8px; margin-right: 2%; box-sizing: border-box; }
        h1, h2 { color: #38bdf8; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 14px; }
        th { background-color: #0f172a; color: #94a3b8; }
        .urgent { color: #ef4444; font-weight: bold; }
        .chart-wrapper { display: flex; justify-content: center; align-items: center; height: 260px; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>AutoStock Operations Dashboard</h1>
        <button class="logout-btn" onclick="logoutUser()">Sign Out</button>
    </div>

    <div class="card" style="margin-bottom: 20px;">
        <h2>Warehouse Quantities</h2>
        <div class="stat-box">
            <h3>Total Checked In</h3>
            <h1 id="totalIn">0</h1>
        </div>
        <div class="stat-box">
            <h3>Total Checked Out</h3>
            <h1 id="totalOut">0</h1>
        </div>
        <div class="stat-box">
            <h3>Total Waste</h3>
            <h1 id="totalWaste" class="urgent">0</h1>
        </div>
    </div>

    <div class="grid-container">
        <div class="card">
            <h2>Checkout Reason Analysis</h2>
            <div class="chart-wrapper">
                <canvas id="wasteChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>Oldest Stock (FIFO Clearance Priority)</h2>
            <table>
                <thead>
                    <tr>
                        <th>Category</th>
                        <th>Check-In Date</th>
                        <th>Expiry Date</th>
                    </tr>
                </thead>
                <tbody id="fifoTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Use the exact same config parameters as your login screen
        const firebaseConfig = {
            apiKey: "AIzaSyBhBTqQ1iadLatbKyD7DE7UM7gihfLjYEY", // <-- Paste your Web API key here too
            authDomain: "autostock-c3953.firebaseapp.com",
            databaseURL: "https://autostock-c3953-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // SECURITY GUARD: Kick unauthenticated traffic out to security terminal
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "loginpage.html";
            }
        });

        // Run data pipeline parsing loops from active cloud records
        database.ref('InventoryLogs').on('value', (snapshot) => {
            let countIn = 0;
            let countSold = 0;
            let countExpired = 0;
            let countDamaged = 0;
            let checkInList = [];

            snapshot.forEach((childSnapshot) => {
                let item = childSnapshot.val();

                if (item.Action === "CHECK_IN") {
                    countIn++;
                    checkInList.push(item); 
                } 
                else if (item.Action === "CHECK_OUT") {
                    if (item.Reason === "Sold") countSold++;
                    if (item.Reason === "Expired") countExpired++;
                    if (item.Reason === "Damaged") countDamaged++;
                }
            });

            // Update DOM numeric interfaces
            document.getElementById('totalIn').innerText = countIn;
            document.getElementById('totalOut').innerText = (countSold + countExpired + countDamaged);
            document.getElementById('totalWaste').innerText = (countExpired + countDamaged);

            // Trigger charting canvas engine updates
            updateChart(countSold, countExpired, countDamaged);

            // Execute FIFO timeline sequencing calculations
            checkInList.sort((a, b) => new Date(a.Timestamp) - new Date(b.Timestamp));
            let oldestItems = checkInList.slice(0, 5); // Grab the top 5 oldest rows
            
            let tableHTML = "";
            oldestItems.forEach(item => {
                tableHTML += `
                    <tr>
                        <td>${item.Category.replace('_', ' ')}</td>
                        <td>${item.Timestamp}</td>
                        <td class="urgent">${item.ExpiryDate || 'N/A'}</td>
                    </tr>
                `;
            });
            document.getElementById('fifoTableBody').innerHTML = tableHTML;
        });

        // Chart render generation logic block
        let myChart;
        function updateChart(sold, expired, damaged) {
            const ctx = document.getElementById('wasteChart').getContext('2d');
            if(myChart) myChart.destroy(); // Wipe cache buffer cleanly before rebuilds

            myChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Items Sold', 'Expired (Waste)', 'Damaged (Waste)'],
                    datasets: [{
                        data: [sold, expired, damaged],
                        backgroundColor: ['#22c55e', '#f97316', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: 'white' } } }
                }
            });
        }

        // Drop active user identity session token on click
        function logoutUser() {
            firebase.auth().signOut().then(() => {
                window.location.href = "loginpage.html";
            });
        }
    </script>
</body>
</html>
