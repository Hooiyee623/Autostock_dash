<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoStock — Sign In</title>
    <link rel="icon" type="image/png" href="assets/autostock_logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase-config.js"></script>
</head>
<body class="login-page">
    <div class="login-bg"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-brand">
                <img src="assets/autostock_logo.png" alt="AutoStock" class="brand-logo">
                <h1>AutoStock</h1>
                <p>Warehouse Management System</p>
            </div>

            <div class="form-group">
                <label class="form-label" for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" class="form-input" placeholder="manager@autostock.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label" for="loginPassword">Password</label>
                <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button class="login-btn" onclick="handleLogin()">Sign In</button>
            <div class="login-error" id="errorDiv"></div>
        </div>
    </div>

    <script>
        document.getElementById('loginPassword').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('errorDiv');
            errorDiv.textContent = '';

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(() => { window.location.href = 'dashboard.html'; })
                .catch(error => {
                    const credentialErrors = [
                        'auth/wrong-password',
                        'auth/user-not-found',
                        'auth/invalid-credential',
                        'auth/invalid-email',
                        'auth/missing-password'
                    ];
                    errorDiv.textContent = credentialErrors.includes(error.code)
                        ? 'Invalid email or password.'
                        : 'Something went wrong. Please try again.';
                });
        }
    </script>
</body>
</html>
